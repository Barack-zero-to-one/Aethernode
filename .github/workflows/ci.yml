name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_scale:
        description: >-
          Run integration tests at full production scale (50 relays / 10,000
          messages / 250 messages-per-day-bucket) instead of the faster
          CI-scaled defaults used on every push.
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check every module
        run: >-
          python -m py_compile
          relay.py gossip.py client.py protocol.py ratelimit.py
          simulate_partition.py stress_test_quota.py stress_test_quota_multiday.py
          smoke_test.py

      - name: Run smoke tests (pure logic, no sockets)
        run: python smoke_test.py

  integration:
    name: Integration (real AF_UNIX sockets, real relay.py subprocesses)
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # workflow_dispatch's boolean input arrives as the string "true"/"false";
      # push/pull_request runs have no input at all, which correctly falls
      # through to the faster CI-scaled defaults below.
      FULL_SCALE: ${{ github.event.inputs.full_scale == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Partition-resilience simulation (50-relay full mesh, kill half, confirm recovery)
        run: python simulate_partition.py
        env:
          AETHERNODE_SIM_NUM_RELAYS: ${{ env.FULL_SCALE == 'true' && '50' || '12' }}

      - name: Per-recipient quota isolation stress test
        run: python stress_test_quota.py
        env:
          AETHERNODE_STRESS_NUM_MESSAGES: ${{ env.FULL_SCALE == 'true' && '10000' || '600' }}

      - name: Multi-day quota amplification demonstration
        run: python stress_test_quota_multiday.py
        env:
          AETHERNODE_AMPLIFICATION_MESSAGES_PER_DAY: ${{ env.FULL_SCALE == 'true' && '250' || '60' }}
